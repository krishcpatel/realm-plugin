name: realm
version: '0.1'
main: com.krishcpatel.realm.core.Core
api-version: '26.1.2'

commands:
  realm:
    description: Realm core command
    usage: /realm [reload|giveitem]
  balance:
    description: Check a bank balance
    usage: /balance [player]
    aliases: [bal]
  withdraw:
    description: Withdraw a bank note
    usage: /withdraw <amount>
  redeem:
    description: Redeem the bank note in your hand
    usage: /redeem
  pay:
    description: Pay another player
    usage: /pay <player> <amount>
  eco:
    description: Economy admin commands
    usage: /eco <give|take|set> <player> <amount>
  ledger:
    description: View recent ledger entries
    usage: /ledger <player> [n]
  job:
    description: Join, leave, and inspect jobs
    usage: /job <list|stats|caps|join|leave> [job]
  skills:
    description: View your realm skill levels
    usage: /skills [category|skill]
  clan:
    description: Create and manage clans
    usage: /clan <create|join|leave|disband|info|flag|protect|fee|bank|upgrade|claims|admin>
  shop:
    description: Claim and manage shop areas and chest listings
    usage: /shop <menu|list|claim|myareas|payupkeep|setup|setprice|removelisting|listing|listings|admin>

permissions:
  realm.admin:
    default: op
  realm.economy.admin:
    default: op
  realm.economy.ledger:
    default: op
  realm.jobs.use:
    default: true
  realm.skills.use:
    default: true
  realm.clans.use:
    default: true
  realm.clans.admin:
    default: op
  realm.shop.use:
    default: true
  realm.shop.admin:
    default: op
  realm.nexo.bypass-gates:
    default: op

depend:
  - Nexo
