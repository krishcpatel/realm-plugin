settings:
  max-jobs-per-player: 2
  starting-level: 1
  allow-no-job: true
  ignore-creative: true

  notifications:
    enabled: true
    aggregate-window-ms: 900
    sound-enabled: true
    sound: ENTITY_EXPERIENCE_ORB_PICKUP
    sound-volume: 0.35
    sound-pitch: 1.35

  boss-payouts:
    enabled: true
    testing:
      bypass-daily-claim: false
      allow-creative: false
    rewards:
      WARDEN:
        money-min: 800
        money-max: 1000
      WITHER:
        money-min: 650
        money-max: 820
      ENDER_DRAGON:
        money-min: 670
        money-max: 840
      ELDER_GUARDIAN:
        money-min: 260
        money-max: 360

  anti-farm:
    ignore-player-placed-breaks: true
    ignore-spawner-kills: true
    brew-owner-expiry-ms: 300000
    placed-block-guard-retention-days: 14

    action-cooldown-ms:
      break: 0
      place: 250
      kill: 0
      craft: 3000
      fish: 1500
      brew: 15000
      enchant: 5000
      explore: 0

  progression:
    max-level: 50
    required-xp-base: 125
    required-xp-growth: 1.15
    money-per-level: 0.005
    max-money-multiplier: 1.25
    xp-per-level: 0.003
    max-xp-multiplier: 1.15

jobs:
  brewer:
    enabled: true
    display-name: "Brewer"
    description: "Brew potions and keep alchemy moving."
    caps:
      daily-money-cap: 300
      daily-xp-cap: 350
    rewards:
      brew:
        "#potions":
          money-min: 4
          money-max: 6
          xp-min: 4
          xp-max: 7

  builder:
    enabled: true
    display-name: "Builder"
    description: "Place building blocks and shape the world."
    caps:
      daily-money-cap: 150
      daily-xp-cap: 250
    rewards:
      place:
        "#building_blocks":
          money-min: 0
          money-max: 1
          xp-min: 1
          xp-max: 2

  crafter:
    enabled: true
    display-name: "Crafter"
    description: "Craft useful items for the server economy."
